</div>

const CRITERIOS = {

  'Llantas':['Delanteras','Traseras'],
  'Fluidos':['Aceite de motor','Líquido refrigerante','Gasolina','Líquido de dirección','Líquido de frenos','Líquido limpiaparabrisas'],
  'Seguridad':['Cinturones de seguridad','Limpiaparabrisas','Espejos','Sistema de frenos','Pito','Cojinería','Parabrisas','Tablero de instrumentos'],
  'Equipo de prevención':['Gato hidráulico','Placa en buen estado','Una cruceta','Señales triangulares','Botiquín','Extintor vigente','Tacos para bloquear','Caja de herramientas','Llanta de repuesto','Linterna'],
};
const DEFAULT_USERS = [
  {id:'u1',name:'Carlos Gómez',role:'Conductor',email:'carlos@delifflor.com',pass:'1234',initials:'CG',color:'#E67E22'},
  {id:'u2',name:'María López',role:'Verificadora',email:'maria@delifflor.com',pass:'1234',initials:'ML',color:'#2471A3'},
  {id:'u3',name:'Juan Restrepo',role:'Administrador',email:'juan@delifflor.com',pass:'admin123',initials:'JR',color:'#6C3483'},
];

let S = {
  user:null, users:[], records:[], activity:[],
  view:'dashboard', showModal:false, detailId:null,
  loginError:'', search:'', tab:'todos',
  toasts:[], form:null, editUserId:null,
};
let db, col, docFn, setDocFn, deleteDocFn, onSnapshotFn, queryFn, orderByFn;
let unsubRecords=null, unsubActivity=null, unsubUsers=null;

function timeAgo(iso){
  const d=(Date.now()-new Date(iso))/1000;
  if(d<60)return'ahora';if(d<3600)return`hace ${Math.floor(d/60)}m`;
  if(d<86400)return`hace ${Math.floor(d/3600)}h`;return`hace ${Math.floor(d/86400)}d`;
}
function isAdmin(){return S.user?.role===ADMIN_ROLE;}
function showToast(msg,type='success'){
  const id=Date.now();S.toasts.push({id,msg,type});render();
  setTimeout(()=>{S.toasts=S.toasts.filter(t=>t.id!==id);render();},3500);
}

// ── FIREBASE LISTENERS ──
function startListeners(){
  if(unsubRecords) unsubRecords();
  if(unsubActivity) unsubActivity();
  if(unsubUsers) unsubUsers();

  unsubRecords = onSnapshotFn(
    queryFn(col(db,'records'), orderByFn('createdAt','desc')),
    snap => {
      S.records = snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.user && !S.showModal) render();
    }
  );
  unsubActivity = onSnapshotFn(
    queryFn(col(db,'activity'), orderByFn('ts','desc')),
    snap => {
      S.activity = snap.docs.map(d=>({id:d.id,...d.data()}));
      if(S.user && !S.showModal) render();
    }
  );
  unsubUsers = onSnapshotFn(col(db,'users'), snap => {
    if(snap.empty){ initDefaultUsers(); return; }
    S.users = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(S.user){
      const fresh = S.users.find(u=>u.id===S.user.id);
      if(fresh) S.user = fresh;
    }
    if(!S.showModal) render();
  });
}

async function initDefaultUsers(){
  for(const u of DEFAULT_USERS){
    await setDocFn(docFn(db,'users',u.id), u);
  }
}

// ── AUTH ──
function login(email,pass){
  const u=S.users.find(x=>x.email.toLowerCase()===email.toLowerCase()&&x.pass===pass);
  if(u){S.user=u;S.loginError='';render();}
  else{S.loginError='Correo o contraseña incorrectos.';render();}
}
function logout(){
  S.user=null;S.view='dashboard';S.showModal=false;S.form=null;S.detailId=null;render();
}

// ── FORM ──
function initForm(){
  const checks={};
  Object.entries(CRITERIOS).forEach(([cat,items])=>
    items.forEach(item=>{checks[`${cat}|${item}`]={val:null,na:false};}));
  return{
    conductor:S.user?.name||'',cedula:'',cargo:S.user?.role||'',placa:'',
    mes:new Date().toISOString().slice(0,7),dia:String(new Date().getDate()),
    checks,firmaNombre1:'',firmaData1:null,firmaNombre2:'',firmaData2:null,
  };
}
function getCheckCounts(checks){
  const vals=Object.values(checks).filter(c=>!c.na);
  const total=vals.length,b=vals.filter(c=>c.val==='B').length,
        m=vals.filter(c=>c.val==='M').length,pend=vals.filter(c=>c.val===null).length;
  return{total,b,m,pend};
}
function getRecordStatus(rec){
  const{m,pend}=getCheckCounts(rec.form.checks);
  if(pend>0)return'pendiente';if(m>0)return'mal';return'bien';
}
function getFilteredRecs(){
  let recs=[...S.records];
  if(S.tab!=='todos')recs=recs.filter(r=>getRecordStatus(r)===S.tab);
  if(S.search){const q=S.search.toLowerCase();recs=recs.filter(r=>r.form.placa?.toLowerCase().includes(q)||r.form.conductor?.toLowerCase().includes(q));}
  return recs;
}

async function submitForm(){
  const f=S.form;
  if(!f.placa.trim()||!f.cedula.trim()){showToast('Complete Placa y Cédula','error');return;}
  const id='r'+Date.now();
  const rec={id,createdAt:new Date().toISOString(),userId:S.user.id,userName:S.user.name,form:JSON.parse(JSON.stringify(f))};
  await setDocFn(docFn(db,'records',id),rec);
  const aid='a'+Date.now();
  await setDocFn(docFn(db,'activity',aid),{
    id:aid,ts:new Date().toISOString(),userId:S.user.id,
    userName:S.user.name,initials:S.user.initials,color:S.user.color,
    action:`Envió lista de chequeo · Placa ${f.placa.toUpperCase()}`,type:'submit'
  });
  S.showModal=false;S.form=null;showToast('✓ Registro guardado');
}

async function deleteRecord(id){
  if(!confirm('¿Eliminar este registro?'))return;
  await deleteDocFn(docFn(db,'records',id));
  showToast('Registro eliminado','error');render();
}

// ── EXCEL ──
function exportExcel(){
  if(!window.XLSX){showToast('Cargando librería...','error');return;}
  const rows=S.records.map(rec=>{
    const f=rec.form;const{b,m,pend}=getCheckCounts(f.checks);
    const st=getRecordStatus(rec);
    const row={'Fecha':new Date(rec.createdAt).toLocaleString('es-CO'),'Registrado por':rec.userName,
      'Conductor':f.conductor,'Cédula':f.cedula,'Cargo':f.cargo,'Placa':f.placa,
      'Estado':st==='bien'?'Buen estado':st==='mal'?'Con fallas':'Pendiente',
      'B':b,'M':m,'Pendientes':pend,'Firma colaborador':f.firmaNombre1,'Firma verificador':f.firmaNombre2};
    Object.entries(CRITERIOS).forEach(([cat,items])=>
      items.forEach(item=>{
        const c=f.checks[`${cat}|${item}`];
        row[`${cat} - ${item}`]=c?.na?'N/A':c?.val==='B'?'Bien':c?.val==='M'?'Mal':'Pendiente';
      }));
    return row;
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Registros');
  XLSX.writeFile(wb,`delifflor_${new Date().toLocaleDateString('es-CO').replace(/\//g,'-')}.xlsx`);
  showToast('📊 Excel descargado');
}

// ── USERS ──
async function saveUser(data){
  if(!isAdmin())return;
  if(!data.name||!data.email){showToast('Nombre y correo obligatorios','error');return;}
  if(!data.id&&!data.pass){showToast('Contraseña obligatoria para nuevo usuario','error');return;}
  if(data.id){
    const existing=S.users.find(u=>u.id===data.id);
    const updated={...existing,...data};
    if(!data.pass)delete updated.pass, updated.pass=existing.pass;
    await setDocFn(docFn(db,'users',data.id),updated);
    showToast('Usuario actualizado');
  } else {
    const id='u'+Date.now();
    const initials=data.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const colors=['#E67E22','#2471A3','#1A7A3A','#C0392B','#6C3483','#D68910'];
    const color=colors[S.users.length%colors.length];
    await setDocFn(docFn(db,'users',id),{...data,id,initials,color});
    showToast('✓ Usuario creado');
  }
  S.editUserId=null;render();
}
async function deleteUser(id){
  if(!isAdmin())return;
  if(id===S.user.id){showToast('No puedes eliminar tu cuenta','error');return;}
  if(!confirm('¿Eliminar usuario?'))return;
  await deleteDocFn(docFn(db,'users',id));
  showToast('Usuario eliminado','error');
}

// ── SIGNATURE ──
let sigDrawing={1:false,2:false};
function setupCanvas(num){
  const canvas=document.getElementById(`sig-canvas-${num}`);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  ctx.strokeStyle='#145A32';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.lineJoin='round';
  const getPos=e=>{
    const r=canvas.getBoundingClientRect(),scaleX=canvas.width/r.width,scaleY=canvas.height/r.height;
    if(e.touches)return{x:(e.touches[0].clientX-r.left)*scaleX,y:(e.touches[0].clientY-r.top)*scaleY};
    return{x:(e.clientX-r.left)*scaleX,y:(e.clientY-r.top)*scaleY};
  };
  canvas.onmousedown=canvas.ontouchstart=e=>{e.preventDefault();sigDrawing[num]=true;const p=getPos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);};
  canvas.onmousemove=canvas.ontouchmove=e=>{e.preventDefault();if(!sigDrawing[num])return;const p=getPos(e);ctx.lineTo(p.x,p.y);ctx.stroke();};
  canvas.onmouseup=canvas.onmouseleave=canvas.ontouchend=()=>{
    if(sigDrawing[num]){sigDrawing[num]=false;if(S.form)S.form[`firmaData${num}`]=canvas.toDataURL();}
  };
  if(S.form&&S.form[`firmaData${num}`]){
    const img=new Image();img.onload=()=>ctx.drawImage(img,0,0);img.src=S.form[`firmaData${num}`];
  }
}
function clearCanvas(num){
  const canvas=document.getElementById(`sig-canvas-${num}`);
  if(!canvas)return;
  canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
  if(S.form)S.form[`firmaData${num}`]=null;
}

  Object.entries(CRITERIOS).forEach(([cat,items])=>{

      checkHtml+=`<div class="check-item-row">
        <span class="check-label">${item}</span>
        ${c.na?`<span style="font-size:12px;color:var(--text3);font-style:italic">No aplica</span>`:`
        <div class="toggle-group">
          <button class="toggle-btn ok ${c.val==='B'?'active':''}" data-check="${key}" data-val="B">✓ B</button>
          <button class="toggle-btn fail ${c.val==='M'?'active':''}" data-check="${key}" data-val="M">✗ M</button>
        </div>`}
        <label class="na-label"><input type="checkbox" data-na="${key}" ${c.na?'checked':''}> N/A</label>
      </div>`;
    });
    checkHtml+=`</div>`;
  });
  return`
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <div class="modal-head"><h2>📋 Nuevo control preoperacional</h2><button class="modal-close" id="modal-close">✕</button></div>
    <div class="modal-body">
      <div class="form-section">
        <div class="form-section-title">🚗 Conductor y vehículo</div>
        <div class="form-grid">
          <div class="fi"><label>Nombres y apellidos *</label><input id="fi-conductor" value="${f.conductor}" placeholder="Nombre completo"></div>
          <div class="fi"><label>Cédula *</label><input id="fi-cedula" value="${f.cedula}" placeholder="Número de documento"></div>
        </div>
        <div class="form-grid">
          <div class="fi"><label>Cargo</label><input id="fi-cargo" value="${f.cargo}" placeholder="Ej: Conductor"></div>
          <div class="fi"><label>Placa *</label><input id="fi-placa" value="${f.placa}" placeholder="Ej: ABC-123" style="text-transform:uppercase"></div>
        </div>
        <div class="form-grid">
          <div class="fi"><label>Mes</label><input type="month" id="fi-mes" value="${f.mes}"></div>
          <div class="fi"><label>Día</label><input type="number" id="fi-dia" min="1" max="31" value="${f.dia}"></div>
        </div>
      </div>
      <div class="form-section">
        <div class="form-section-title" style="justify-content:space-between">
          <span>🔍 Verificación · B = Buen estado · M = Mal estado</span>
          <span style="font-size:12px;color:var(--text3);font-weight:400">${b+m}/${total} verificados</span>
        </div>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-labels">
            <span style="color:var(--green)">✓ Bien: ${b}</span>
            <span style="color:var(--red)">✗ Mal: ${m}</span>
            <span style="color:var(--amber)">⏳ Pendiente: ${pend}</span>
          </div>
        </div>
        ${checkHtml}
      </div>
      <div class="form-section">
        <div class="form-section-title">✍️ Firmas digitales</div>
        <div class="sig-section">
          <div class="sig-card">
            <div class="sig-card-head"><label>Firma colaborador</label><button class="sig-clear-btn" data-clear-sig="1">Limpiar</button></div>
            <canvas id="sig-canvas-1" class="sig-canvas" width="340" height="100"></canvas>
            <div class="sig-hint">Dibuja tu firma arriba</div>
            <input class="sig-name-input" id="fi-firma1" value="${f.firmaNombre1}" placeholder="Nombre del colaborador">
          </div>
          <div class="sig-card">
            <div class="sig-card-head"><label>Firma verificador</label><button class="sig-clear-btn" data-clear-sig="2">Limpiar</button></div>
            <canvas id="sig-canvas-2" class="sig-canvas" width="340" height="100"></canvas>
            <div class="sig-hint">Dibuja tu firma arriba</div>
            <input class="sig-name-input" id="fi-firma2" value="${f.firmaNombre2}" placeholder="Nombre del verificador">
          </div>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" id="modal-cancel">Cancelar</button>
      <button class="btn btn-green" id="modal-save">💾 Guardar registro</button>
    </div>
  </div>
</div>`;}

function renderDetail(){
  const rec=S.records.find(r=>r.id===S.detailId);if(!rec)return'';
  const f=rec.form;const{b,m,pend}=getCheckCounts(f.checks);const st=getRecordStatus(rec);
  const stB=st==='bien'?'<span class="badge badge-ok">✓ Buen estado</span>':st==='mal'?'<span class="badge badge-fail">⚠ Con fallas</span>':'<span class="badge badge-pend">⏳ Pendiente</span>';
  let checkHtml='';
  Object.entries(CRITERIOS).forEach(([cat,items])=>{
    checkHtml+=`<div style="margin-bottom:14px"><div class="check-cat-label" style="margin-bottom:6px">🔹 ${cat}</div>`;
    items.forEach(item=>{
      const key=`${cat}|${item}`;const c=f.checks[key];
      const icon=c.na?'⬜ N/A':c.val==='B'?'<span style="color:var(--green)">✅ Bien</span>':c.val==='M'?'<span style="color:var(--red)">❌ Mal</span>':'<span style="color:var(--amber)">⏳ Pendiente</span>';
      checkHtml+=`<div class="check-result-item"><span>${item}</span><span>${icon}</span></div>`;
    });
    checkHtml+='</div>';
  });
  return`
<div class="modal-overlay">
  <div class="modal-box">
    <div class="modal-head"><h2>🔍 Detalle · <span class="placa-code">${f.placa}</span> ${stB}</h2><button class="modal-close" id="detail-close">✕</button></div>
    <div class="modal-body">
      <div class="detail-grid">
        <div class="detail-row"><span class="detail-key">Conductor</span><span class="detail-val">${f.conductor}</span></div>
        <div class="detail-row"><span class="detail-key">Cédula</span><span class="detail-val">${f.cedula||'—'}</span></div>
        <div class="detail-row"><span class="detail-key">Cargo</span><span class="detail-val">${f.cargo||'—'}</span></div>
        <div class="detail-row"><span class="detail-key">Placa</span><span class="detail-val">${f.placa||'—'}</span></div>
        <div class="detail-row"><span class="detail-key">Fecha</span><span class="detail-val">${new Date(rec.createdAt).toLocaleString('es-CO')}</span></div>
        <div class="detail-row"><span class="detail-key">Registrado por</span><span class="detail-val">${rec.userName}</span></div>
      </div>
      <div style="display:flex;gap:16px;padding:12px 16px;background:var(--surface1);border-radius:var(--radius);margin-bottom:16px;font-size:13.5px">
        <span style="color:var(--green);font-weight:600">✓ Bien: ${b}</span>
        <span style="color:var(--red);font-weight:600">✗ Mal: ${m}</span>
        <span style="color:var(--amber);font-weight:600">⏳ Pendiente: ${pend}</span>
      </div>
      ${checkHtml}
      ${(f.firmaData1||f.firmaData2||f.firmaNombre1||f.firmaNombre2)?`
      <div style="margin-top:14px">
        <div class="form-section-title">✍️ Firmas</div>
        <div class="sig-section" style="margin-top:10px">
          ${f.firmaData1?`<div class="sig-card"><div class="sig-card-head"><label>Colaborador</label></div><img src="${f.firmaData1}" style="width:100%;height:80px;object-fit:contain;padding:8px"><div class="sig-hint">${f.firmaNombre1||''}</div></div>`:f.firmaNombre1?`<div class="detail-row"><span class="detail-key">Colaborador</span><span class="detail-val">${f.firmaNombre1}</span></div>`:''}
          ${f.firmaData2?`<div class="sig-card"><div class="sig-card-head"><label>Verificador</label></div><img src="${f.firmaData2}" style="width:100%;height:80px;object-fit:contain;padding:8px"><div class="sig-hint">${f.firmaNombre2||''}</div></div>`:f.firmaNombre2?`<div class="detail-row"><span class="detail-key">Verificador</span><span class="detail-val">${f.firmaNombre2}</span></div>`:''}
        </div>
      </div>`:''}
    </div>
    <div class="modal-foot"><button class="btn btn-outline" id="detail-close2">Cerrar</button></div>
  </div>
</div>`;}

// ════════════════ BIND ════════════════
function bindShell(){
  document.getElementById('btn-logout')?.addEventListener('click',logout);
  document.getElementById('nav-dash')?.addEventListener('click',()=>{S.view='dashboard';render();});
  document.getElementById('nav-admin')?.addEventListener('click',()=>{S.view='admin';render();});
  if(S.view==='dashboard')bindDashboard();
  if(S.view==='admin')bindAdmin();
  if(S.showModal)bindModal();
  if(S.detailId)bindDetail();
}
function bindDashboard(){
  document.getElementById('btn-new')?.addEventListener('click',()=>{S.form=initForm();S.showModal=true;render();});
  document.getElementById('btn-export')?.addEventListener('click',exportExcel);
  document.getElementById('search-inp')?.addEventListener('input',e=>{S.search=e.target.value;render();});
  document.querySelectorAll('[data-tab]').forEach(t=>t.addEventListener('click',()=>{S.tab=t.dataset.tab;render();}));
  document.querySelectorAll('[data-detail]').forEach(b=>b.addEventListener('click',()=>{S.detailId=b.dataset.detail;render();}));
  document.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>deleteRecord(b.dataset.del)));
}
function bindAdmin(){
  document.getElementById('btn-export-adm')?.addEventListener('click',exportExcel);
  document.getElementById('adm-cancel')?.addEventListener('click',()=>{S.editUserId=null;render();});
  document.querySelectorAll('[data-edit-user]').forEach(b=>b.addEventListener('click',()=>{S.editUserId=b.dataset.editUser;render();}));
  document.querySelectorAll('[data-del-user]').forEach(b=>b.addEventListener('click',()=>deleteUser(b.dataset.delUser)));
  document.getElementById('adm-save')?.addEventListener('click',()=>{
    const data={name:document.getElementById('adm-name').value.trim(),email:document.getElementById('adm-email').value.trim(),pass:document.getElementById('adm-pass').value,role:document.getElementById('adm-role').value};
    if(S.editUserId)data.id=S.editUserId;
    saveUser(data);
  });
}
function bindModal(){
  const saveFields=()=>{
    if(!S.form)return;
    S.form.conductor=document.getElementById('fi-conductor')?.value||'';
    S.form.cedula=document.getElementById('fi-cedula')?.value||'';
    S.form.cargo=document.getElementById('fi-cargo')?.value||'';
    S.form.placa=document.getElementById('fi-placa')?.value?.toUpperCase()||'';
    S.form.mes=document.getElementById('fi-mes')?.value||'';
    S.form.dia=document.getElementById('fi-dia')?.value||'';
    S.form.firmaNombre1=document.getElementById('fi-firma1')?.value||'';
    S.form.firmaNombre2=document.getElementById('fi-firma2')?.value||'';
  };
  document.getElementById('modal-close')?.addEventListener('click',()=>{S.showModal=false;S.form=null;render();});
  document.getElementById('modal-cancel')?.addEventListener('click',()=>{S.showModal=false;S.form=null;render();});
  document.getElementById('modal-overlay')?.addEventListener('click',e=>{if(e.target.id==='modal-overlay'){S.showModal=false;S.form=null;render();}});
  document.getElementById('modal-save')?.addEventListener('click',()=>{saveFields();submitForm();});
  document.querySelectorAll('[data-check]').forEach(btn=>btn.addEventListener('click',()=>{
    saveFields();const key=btn.dataset.check,val=btn.dataset.val,c=S.form.checks[key];
    c.val=(c.val===val)?null:val;updateChecklistUI();
  }));
  document.querySelectorAll('[data-na]').forEach(cb=>cb.addEventListener('change',()=>{
    saveFields();const key=cb.dataset.na;S.form.checks[key].na=cb.checked;
    if(cb.checked)S.form.checks[key].val=null;updateChecklistUI();
  }));
  document.querySelectorAll('[data-clear-sig]').forEach(btn=>btn.addEventListener('click',()=>clearCanvas(parseInt(btn.dataset.clearSig))));
  requestAnimationFrame(()=>{setupCanvas(1);setupCanvas(2);});
}
function updateChecklistUI(){
  const f=S.form;const{b,m,pend,total}=getCheckCounts(f.checks);
  const pct=total>0?Math.round(((b+m)/total)*100):0;
  const fill=document.querySelector('.progress-fill');if(fill)fill.style.width=pct+'%';
  const labs=document.querySelectorAll('.progress-labels span');
  if(labs[0])labs[0].textContent=`✓ Bien: ${b}`;
  if(labs[1])labs[1].textContent=`✗ Mal: ${m}`;
  if(labs[2])labs[2].textContent=`⏳ Pendiente: ${pend}`;
  document.querySelectorAll('[data-check]').forEach(btn=>{
    const key=btn.dataset.check,val=btn.dataset.val,c=f.checks[key];
    btn.classList.toggle('active',c.val===val);
  });
  document.querySelectorAll('[data-na]').forEach(cb=>{
    const row=cb.closest('.check-item-row');if(!row)return;
    const tg=row.querySelector('.toggle-group');if(tg)tg.style.display=f.checks[cb.dataset.na].na?'none':'';
  });
}
function bindDetail(){
  const close=()=>{S.detailId=null;render();};
  document.getElementById('detail-close')?.addEventListener('click',close);
  document.getElementById('detail-close2')?.addEventListener('click',close);
}

// ════════════════ START ════════════════
function onFirebaseReady(){
  db=window._db;col=window._col;docFn=window._doc;
  setDocFn=window._setDoc;deleteDocFn=window._deleteDoc;
  onSnapshotFn=window._onSnapshot;queryFn=window._query;orderByFn=window._orderBy;
  startListeners();
}
if(window._firebaseReady){onFirebaseReady();}
else{window.addEventListener('firebaseReady',onFirebaseReady);}
</script>
</body>
</html>
